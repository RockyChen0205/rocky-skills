# 字段说明
# id: 唯一标识，标题缩写（去掉空格和特殊字符）+ 年份
# title: 论文标题（精简版，去掉副标题中的冗长描述）
# arxiv: arXiv ID（可选）
# date: 发表年月
# team: 团队（精简版，保留主要机构，去掉"University of"等）
# year: 年份数字
# core_contribution:
#   - 必须是一句话（50-80字）
#   - 包含：方法名称 + 核心机制 + 创新点 + 效果/应用
#   - 示例："提出XXX框架，通过YYY技术实现ZZZ，在AAA场景下达到BBB效果"
# task_type: 任务类型列表（3-5个关键词）
# method_type: 方法类型列表（3-5个关键词）
# tech_highlights: 技术亮点列表（3-5个关键词）

# note_path 推断规则
# paper-index.yaml 所在目录 + {id}.md
# 例如：03-Papers/xxx/paper-index.yaml 中的 video-thinker-2025
# → 对应 03-Papers/xxx/video-thinker-2025.md
